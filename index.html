<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Anfrage</title>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

h3{margin-top:20px;}

.group{
  background:#f9f9f9;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:14px;
  background:#1a73e8;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
}

#status{margin-top:10px;}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Kundendaten</h2>

<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">

<h2>📍 Adresse</h2>

<input id="strasse" placeholder="Straße *">
<input id="plz" placeholder="PLZ *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<h2>🔧 Service</h2>

<div class="group">
<label><input type="checkbox" id="abbau"> Abbau</label>
<label><input type="checkbox" id="transport"> Transport</label>
<label><input type="checkbox" id="aufbau"> Aufbau</label>
</div>

<div class="group">
<label><input type="radio" name="transporter" value="vorhanden" id="t1"> Transporter vorhanden</label><br>
<label><input type="radio" name="transporter" value="nicht" id="t2"> Transporter muss gestellt werden</label>
</div>

<h2>📅 Gewünschter Termin</h2>

<input type="date" id="datum">
<input type="time" id="uhrzeit">

<h2>🛒 Produkte</h2>

<label><input type="checkbox" id="sofa"> Sofa</label>
<input type="number" id="sofaAmount" placeholder="Stück">

<label><input type="checkbox" id="stuhl"> Stuhl</label>
<input type="number" id="stuhlAmount">

<label><input type="checkbox" id="tisch"> Tisch</label>
<input type="number" id="tischAmount">

<h2>✍️ Anmerkung</h2>

<textarea id="note"></textarea>

<button onclick="sendData()">Absenden</button>

<p id="status"></p>

</div>

<script>
async function sendData(){

  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  const email = document.getElementById("email").value.trim();

  const strasse = document.getElementById("strasse").value.trim();
  const plz = document.getElementById("plz").value.trim();
  const ort = document.getElementById("ort").value.trim();
  const bundesland = document.getElementById("bundesland").value.trim();

  const datum = document.getElementById("datum").value;
  const uhrzeit = document.getElementById("uhrzeit").value;

  const note = document.getElementById("note").value;

  const abbau = document.getElementById("abbau").checked;
  const transport = document.getElementById("transport").checked;
  const aufbau = document.getElementById("aufbau").checked;

  const transporter = document.querySelector('input[name="transporter"]:checked')?.value || "";

  if(!vorname || !nachname || !email || !strasse || !plz || !ort || !bundesland || !datum || !uhrzeit){
    alert("Bitte alle Pflichtfelder ausfüllen");
    return;
  }

  const items = [];

  function add(id,name){
    if(document.getElementById(id).checked){
      items.push({
        name,
        amount: document.getElementById(id+"Amount").value || 1
      });
    }
  }

  add("sofa","Sofa");
  add("stuhl","Stuhl");
  add("tisch","Tisch");

  const data = {
    customer:{
      vorname,nachname,email,
      adresse:{strasse,plz,ort,bundesland}
    },
    service:{abbau,transport,aufbau,transporter},
    termin:{datum,uhrzeit},
    items,
    note
  };

  localStorage.setItem("order", JSON.stringify(data));

  window.location.href = "success.html";
}
</script>

</body>
</html>
