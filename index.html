<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bestellung</title>

<style>
body {
  font-family: Arial;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0 10px 0;
  box-sizing: border-box;
}

label {
  font-weight: bold;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #1a73e8;
  color: white;
  border: none;
  cursor: pointer;
  font-size: 16px;
}

#status {
  margin-top: 15px;
  font-weight: bold;
  color: red;
}
</style>
</head>

<body>

<h2>Kundendaten</h2>

<label>Vorname *</label>
<input type="text" id="vorname">

<label>Nachname *</label>
<input type="text" id="nachname">

<label>E-Mail *</label>
<input type="email" id="email">

<label>Telefon (optional)</label>
<input type="text" id="telefon">

<label>Adresse *</label>
<input type="text" id="adresse">

<hr>

<h2>Bestellung</h2>

<label><input type="checkbox" id="sofa"> Sofa</label>
<input type="number" id="sofaAmount" placeholder="Stück">

<br><br>

<label><input type="checkbox" id="stuhl"> Stuhl</label>
<input type="number" id="stuhlAmount" placeholder="Stück">

<br><br>

<label><input type="checkbox" id="tisch"> Tisch</label>
<input type="number" id="tischAmount" placeholder="Stück">

<br><br>

<button onclick="sendData()">Absenden</button>

<p id="status"></p>

<script>
async function sendData() {

  const status = document.getElementById("status");
  status.style.color = "red";

  // 🔴 Pflichtfelder prüfen
  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  const email = document.getElementById("email").value.trim();
  const adresse = document.getElementById("adresse").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  if(!vorname || !nachname || !email || !adresse){
    status.innerText = "Bitte alle Pflichtfelder ausfüllen!";
    return;
  }

  const items = [];

  if(document.getElementById("sofa").checked){
    items.push({name:"Sofa", amount:document.getElementById("sofaAmount").value || 1});
  }

  if(document.getElementById("stuhl").checked){
    items.push({name:"Stuhl", amount:document.getElementById("stuhlAmount").value || 1});
  }

  if(document.getElementById("tisch").checked){
    items.push({name:"Tisch", amount:document.getElementById("tischAmount").value || 1});
  }

  if(items.length === 0){
    status.innerText = "Bitte mindestens einen Artikel auswählen!";
    return;
  }

  status.innerText = "Sende...";

  try {

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbxdFWwtX3-FcVaOKgMio5ZeoGM7Ngk13jTt_v30f2sDA8PHu7_deu3psd7rnrM8DjsLEA/exec",
      {
        method: "POST",
        body: JSON.stringify({
          customer: {
            vorname,
            nachname,
            email,
            telefon,
            adresse
          },
          items
        })
      }
    );

    const text = await response.text();
    console.log(text);

    status.style.color = "green";
    status.innerText = "Bestellung erfolgreich gesendet!";

  } catch (error) {
    console.error(error);
    status.innerText = "Fehler beim Senden!";
  }
}
</script>

</body>
</html>
