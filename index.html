<script>
async function send(){

  const data = {
    customer:{
      vorname:vorname.value,
      nachname:nachname.value,
      email:email.value,
      adresse:{
        strasse:strasse.value,
        plz:plz.value,
        ort:ort.value,
        bundesland:bundesland.value
      }
    },
    service:{
      abbau:abbau.checked,
      transport:transport.checked,
      aufbau:aufbau.checked,
      transporter:document.querySelector('input[name="t"]:checked')?.value
    },
    termin:{
      datum:datum.value,
      uhrzeit:uhrzeit.value
    },
    items:[
      sessel.checked ? {name:"Sessel",amount:sesselAmount.value||1}:null,
      stuhl.checked ? {name:"Stuhl",amount:stuhlAmount.value||1}:null,
      hocker.checked ? {name:"Hocker",amount:hockerAmount.value||1}:null,
      couch.checked ? {name:"Couch",amount:couchAmount.value||1}:null,
      sofa.checked ? {name:"Sofa",amount:sofaAmount.value||1}:null,
      liege.checked ? {name:"Liege",amount:liegeAmount.value||1}:null,
      tisch.checked ? {name:"Tisch",amount:tischAmount.value||1}:null,
      schreibtisch.checked ? {name:"Schreibtisch",amount:schreibtischAmount.value||1}:null,
      regal.checked ? {name:"Regal",amount:regalAmount.value||1}:null,
      kommode.checked ? {name:"Kommode",amount:kommodeAmount.value||1}:null,
      waschmaschine.checked ? {name:"Waschmaschine",amount:waschmaschineAmount.value||1}:null,
      trockner.checked ? {name:"Trockner",amount:trocknerAmount.value||1}:null,
      fernseher.checked ? {name:"Fernseher",amount:fernseherAmount.value||1}:null,
      geschirrspueler.checked ? {name:"Geschirrspüler",amount:geschirrspuelerAmount.value||1}:null,
      teppich.checked ? {name:"Teppich",amount:teppichAmount.value||1}:null,
      matratzen.checked ? {name:"Matratzen",amount:matratzenAmount.value||1}:null,
      fahrrad.checked ? {name:"Fahrrad",amount:fahrradAmount.value||1}:null,
      kuehlschrank.checked ? {name:"Kühl-/Gefrierschrank",amount:kuehlschrankAmount.value||1}:null
    ].filter(Boolean),
    note:note.value
  };

  if(!vorname.value || !nachname.value || !email.value){
    alert("Bitte Pflichtfelder ausfüllen");
    return;
  }

  // 🔥 WICHTIG: Daten speichern
  localStorage.setItem("order", JSON.stringify(data));

  try{
    await fetch("DEINE_SCRIPT_URL_HIER",{
      method:"POST",
      body:JSON.stringify(data)
    });

    // 👉 erst DANACH weiterleiten
    window.location.href = "success.html";

  }catch(e){
    alert("Fehler beim Senden");
  }
}
</script>
