<script>
async function sendData() {

  const status = document.getElementById("status");

  const items = [];

  if(document.getElementById("sofa").checked){
    items.push({ name:"Sofa", amount:document.getElementById("sofaAmount").value || 1 });
  }

  if(document.getElementById("stuhl").checked){
    items.push({ name:"Stuhl", amount:document.getElementById("stuhlAmount").value || 1 });
  }

  if(document.getElementById("tisch").checked){
    items.push({ name:"Tisch", amount:document.getElementById("tischAmount").value || 1 });
  }

  if(items.length === 0){
    status.innerText = "Bitte mindestens einen Artikel auswählen!";
    return;
  }

  status.innerText = "Sende...";

  try {

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbyEhU3wMbXG5Mzac3iFk3P3dtroJ82Q3mCNJ0Tdp0mriWLLwtjssMGaZZ2GxNX6WP_6kQ/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ items })
      }
    );

    const result = await response.text();

    console.log("Server Response:", result);

    status.innerText = "Gesendet!";

  } catch(error) {
    console.error(error);
    status.innerText = "Fehler beim Senden!";
  }
}
</script>
