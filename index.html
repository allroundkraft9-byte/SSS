<script>
async function send(){

  const status = document.getElementById("status");
  status.innerText = "Sende...";

  const get = id => document.getElementById(id);

  const items = [
    ["Sessel", get("sessel").value],
    ["Stuhl", get("stuhl").value],
    ["Hocker", get("hocker").value],
    ["Regal", get("regal").value],
    ["Kommode", get("kommode").value],
    ["Koffer", get("koffer").value],
    ["Couch", get("couch").value],
    ["Liege", get("liege").value],
    ["Sofa", get("sofa").value],
    ["Tisch", get("tisch").value],
    ["Schreibtisch", get("schreibtisch").value],
    ["Bettgestell", get("bett").value],
    ["Matratzen", get("matratzen").value],
    ["Waschmaschine", get("waschmaschine").value],
    ["Trockner", get("trockner").value],
    ["Geschirrspüler", get("spueler").value],
    ["Herd/Backofen", get("herd").value],
    ["Fernseher", get("tv").value],
    ["Teppich", get("teppich").value],
    ["Fahrrad", get("fahrrad").value],
    ["Kühlschrank", get("kuehlschrank").value]
  ]
  .filter(i => Number(i[1]) > 0)
  .map(i => ({name:i[0], amount:Number(i[1])}));

  const data = {
    customer:{
      vorname: get("vorname").value,
      nachname: get("nachname").value,
      email: get("email").value,
      adresse:{
        strasse: get("strasse").value,
        plz: get("plz").value,
        ort: get("ort").value,
        bundesland: get("bundesland").value
      }
    },

    // 🔥 FIX: Transportziel korrekt (NICHT mehr ziel.value)
    transportZiel:{
      strasse: get("ziel_strasse").value,
      plz: get("ziel_plz").value,
      ort: get("ziel_ort").value,
      bundesland: get("ziel_bundesland").value
    },

    service:{
      abbau: get("abbau").checked,
      transport: get("transport").checked,
      aufbau: get("aufbau").checked,
      transporter: document.querySelector('input[name="t"]:checked')?.value || ""
    },

    termin:{
      datum: get("datum").value,
      uhrzeit: get("uhrzeit").value
    },

    items: items,
    note: get("note").value
  };

  try{

    const res = await fetch("https://script.google.com/macros/s/AKfycbzKxyQnd8w4gHiWR9pcB-atY6kt_SUS8ojHhcMfAJfzQlwYhVhRzA_AxQlm9l1WBWebNg/exec",{
      method:"POST",
      body: JSON.stringify(data)
    });

    const text = await res.text();

    if(text.includes("OK")){
      status.innerText = "✔ Anfrage erfolgreich gesendet!";
    } else {
      status.innerText = "Fehler: " + text;
    }

  } catch(e){
    status.innerText = "Netzwerkfehler";
  }
}
</script>
