<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Möbel Anfrage</title>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  margin:0;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

h2{
  border-left:5px solid #1a73e8;
  padding-left:10px;
  margin-top:25px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0 12px;
  border:1px solid #ccc;
  border-radius:6px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.card{
  flex:1;
  min-width:200px;
  background:#f7f9fc;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}

button{
  width:100%;
  padding:14px;
  background:#1a73e8;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

#status{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Möbel Anfrage</h1>

<!-- KUNDEN -->
<h2>Kundendaten</h2>
<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">
<input id="telefon" placeholder="Telefon (optional)">

<!-- ADRESSE -->
<h2>Abholort</h2>
<input id="strasse" placeholder="Straße + Hausnummer *">
<input id="plz" placeholder="PLZ *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<!-- TRANSPORTZIEL -->
<h2>Transportziel</h2>
<input id="ziel_strasse" placeholder="Straße + Hausnummer *">
<input id="ziel_plz" placeholder="PLZ *">
<input id="ziel_ort" placeholder="Ort *">
<input id="ziel_bundesland" placeholder="Bundesland *">

<!-- TERMIN -->
<h2>Termin</h2>
<input id="datum" type="date">
<input id="uhrzeit" type="time">

<!-- SERVICE -->
<h2>Zusatzleistung</h2>
<label><input type="checkbox" id="abbau"> Abbau</label>
<label><input type="checkbox" id="aufbau"> Aufbau</label>

<br><br>
<h2>Transport</h2>
<label><input type="radio" name="t" value="vorhanden"> Transporter vorhanden</label>
<label><input type="radio" name="t" value="nicht vorhanden"> Kein Transporter</label>

<!-- MÖBEL -->
<h2>Möbel</h2>

<div class="row">
<div class="card">Sessel <input id="sessel" type="number" value="0"></div>
<div class="card">Stuhl <input id="stuhl" type="number" value="0"></div>
<div class="card">Hocker <input id="hocker" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Regal <input id="regal" type="number" value="0"></div>
<div class="card">Kommode <input id="kommode" type="number" value="0"></div>
<div class="card">Koffer <input id="koffer" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Couch <input id="couch" type="number" value="0"></div>
<div class="card">Liege <input id="liege" type="number" value="0"></div>
<div class="card">Sofa <input id="sofa" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Tisch <input id="tisch" type="number" value="0"></div>
<div class="card">Schreibtisch <input id="schreibtisch" type="number" value="0"></div>
<div class="card">Bettgestell <input id="bett" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Matratzen <input id="matratzen" type="number" value="0"></div>
<div class="card">Waschmaschine <input id="waschmaschine" type="number" value="0"></div>
<div class="card">Trockner <input id="trockner" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Geschirrspüler <input id="spueler" type="number" value="0"></div>
<div class="card">Herd/Backofen <input id="herd" type="number" value="0"></div>
<div class="card">Fernseher <input id="tv" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Teppich <input id="teppich" type="number" value="0"></div>
<div class="card">Fahrrad <input id="fahrrad" type="number" value="0"></div>
<div class="card">Kühlschrank <input id="kuehlschrank" type="number" value="0"></div>
</div>

<!-- NOTIZ -->
<h2>Anmerkung</h2>
<textarea id="note"></textarea>

<button onclick="send()">ABSENDEN</button>

<p id="status"></p>

</div>

<script>
function g(id){return document.getElementById(id)}

async function send(){

  const status = g("status");
  status.innerText = "Sende...";

  const items = [
    ["Sessel","sessel"],["Stuhl","stuhl"],["Hocker","hocker"],
    ["Regal","regal"],["Kommode","kommode"],["Koffer","koffer"],
    ["Couch","couch"],["Liege","liege"],["Sofa","sofa"],
    ["Tisch","tisch"],["Schreibtisch","schreibtisch"],["Bettgestell","bett"],
    ["Matratzen","matratzen"],["Waschmaschine","waschmaschine"],["Trockner","trockner"],
    ["Geschirrspüler","spueler"],["Herd/Backofen","herd"],["Fernseher","tv"],
    ["Teppich","teppich"],["Fahrrad","fahrrad"],["Kühlschrank","kuehlschrank"]
  ]
  .map(i=>({name:i[0],amount:Number(g(i[1]).value||0)}))
  .filter(i=>i.amount>0);

  const data = {
    customer:{
      vorname:g("vorname").value,
      nachname:g("nachname").value,
      email:g("email").value,
      telefon:g("telefon").value,
      adresse:{
        strasse:g("strasse").value,
        plz:g("plz").value,
        ort:g("ort").value,
        bundesland:g("bundesland").value
      }
    },

    transportZiel:{
      strasse:g("ziel_strasse").value,
      plz:g("ziel_plz").value,
      ort:g("ziel_ort").value,
      bundesland:g("ziel_bundesland").value
    },

    termin:{
      datum:g("datum").value,
      uhrzeit:g("uhrzeit").value
    },

    service:{
      abbau:g("abbau").checked,
      transport:g("transport").checked,
      aufbau:g("aufbau").checked,
      transporter:document.querySelector('input[name="t"]:checked')?.value||""
    },

    items:items,
    note:g("note").value
  };

  try{

    const res = await fetch("https://script.google.com/macros/s/AKfycbyGR7SnSuenyywoKt0dKN0kkfU9294qHfqMhBLubqoq8Hv7aFA7RPRA4iP5pltQ6lg5Sw/exec",{
      method:"POST",
      body:JSON.stringify(data)
    });

    const text = await res.text();

    status.innerText = text.includes("OK")
      ? "✔ Gesendet!"
      : "Fehler: "+text;

  }catch(e){
    status.innerText="Netzwerkfehler";
  }
}
</script>

</body>
</html>
