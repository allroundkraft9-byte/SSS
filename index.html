<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bestellung</title>
<style>
body {
  font-family: Arial;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

input[type="number"] {
  width: 80px;
  padding: 5px;
  margin-left: 10px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #1a73e8;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>
<body>

<h2>Bestellung</h2>

<label><input type="checkbox" id="sofa"> Sofa</label>
<input type="number" id="sofaAmount" placeholder="Stück"><br><br>

<label><input type="checkbox" id="stuhl"> Stuhl</label>
<input type="number" id="stuhlAmount" placeholder="Stück"><br><br>

<label><input type="checkbox" id="tisch"> Tisch</label>
<input type="number" id="tischAmount" placeholder="Stück"><br><br>

<button onclick="sendData()">Absenden</button>

<p id="status"></p>

<script>
async function sendData() {

  const items = [];

  if(document.getElementById("sofa").checked){
    items.push({
      name: "Sofa",
      amount: document.getElementById("sofaAmount").value || 1
    });
  }

  if(document.getElementById("stuhl").checked){
    items.push({
      name: "Stuhl",
      amount: document.getElementById("stuhlAmount").value || 1
    });
  }

  if(document.getElementById("tisch").checked){
    items.push({
      name: "Tisch",
      amount: document.getElementById("tischAmount").value || 1
    });
  }

  if(items.length === 0){
    document.getElementById("status").innerText = "Bitte auswählen!";
    return;
  }

  document.getElementById("status").innerText = "Sende...";

  await fetch("https://script.google.com/macros/s/AKfycbxxAUzl28lccyhV117DDqI32raNwTO2OGugFgjLV7XRcRDPfpaXZTL_Ukt-ZmbdbkyOjw/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({items})
  });

  document.getElementById("status").innerText = "Gesendet!";
}
</script>

</body>
</html>
