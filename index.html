<script>
async function send() {

  const status = document.getElementById("status");

  // 🔥 SAFE Zugriff auf Inputs (WICHTIG!)
  const vorname = document.getElementById("vorname");
  const nachname = document.getElementById("nachname");
  const email = document.getElementById("email");

  const strasse = document.getElementById("strasse");
  const plz = document.getElementById("plz");
  const ort = document.getElementById("ort");
  const bundesland = document.getElementById("bundesland");

  // 🚨 Debug Schutz (verhindert weiße Seite)
  if (!vorname || !nachname || !email) {
    document.body.innerHTML = "<h2>Fehler: Formular nicht geladen</h2>";
    return;
  }

  status.innerText = "Sende...";

  // 🧾 Daten
  const data = {
    customer: {
      vorname: vorname.value,
      nachname: nachname.value,
      email: email.value,
      adresse: {
        strasse: strasse.value,
        plz: plz.value,
        ort: ort.value,
        bundesland: bundesland.value
      }
    },

    items: []
  };

  try {

    const response = await fetch("DEINE_SCRIPT_URL_HIER", {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    });

    const text = await response.text();

    console.log(text);

    if (text && text.includes("OK")) {
      window.location.href = "success.html";
    } else {
      status.innerText = "Server Fehler: " + text;
    }

  } catch (e) {
    status.innerText = "Netzwerkfehler";
    console.error(e);
  }
}
</script>
