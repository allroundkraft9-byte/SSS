<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung</title>

<style>
body{
  font-family: Arial;
  max-width: 700px;
  margin: auto;
  padding: 20px;
  background: #f4f4f4;
}

.container{
  background: white;
  padding: 20px;
  border-radius: 10px;
}

input, select{
  width: 100%;
  padding: 8px;
  margin: 5px 0 12px 0;
}

.group{
  margin-bottom: 20px;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

button{
  width:100%;
  padding:12px;
  background:#1a73e8;
  color:white;
  border:none;
  cursor:pointer;
  font-size:16px;
}

button:hover{opacity:0.9}

#status{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Kundendaten</h2>

<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">

<h3>Adresse</h3>
<input id="strasse" placeholder="Straße + Hausnummer *">
<input id="plz" placeholder="PLZ *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<h3>Termin</h3>
<input id="datum" type="date">
<input id="uhrzeit" type="time">

<h3>Service</h3>
<label><input type="checkbox" id="abbau"> Abbau</label><br>
<label><input type="checkbox" id="transport"> Transport</label><br>
<label><input type="checkbox" id="aufbau"> Aufbau</label>

<h3>Transporter</h3>
<label><input type="radio" name="t" value="vorhanden"> vorhanden</label>
<label><input type="radio" name="t" value="nicht vorhanden"> nicht vorhanden</label>

<h3>Möbel</h3>

<div class="group">
<div class="item"><label>Sessel</label><input id="sesselAmount" type="number" value="0"></div>
<div class="item"><label>Stuhl</label><input id="stuhlAmount" type="number" value="0"></div>
<div class="item"><label>Hocker</label><input id="hockerAmount" type="number" value="0"></div>
<div class="item"><label>Sofa</label><input id="sofaAmount" type="number" value="0"></div>
<div class="item"><label>Couch</label><input id="couchAmount" type="number" value="0"></div>
<div class="item"><label>Tisch</label><input id="tischAmount" type="number" value="0"></div>
<div class="item"><label>Bett</label><input id="bettAmount" type="number" value="0"></div>
<div class="item"><label>TV</label><input id="tvAmount" type="number" value="0"></div>
</div>

<h3>Anmerkung</h3>
<textarea id="note"></textarea>

<button onclick="send()">Absenden</button>

<p id="status"></p>

</div>

<script>
async function send(){

  const status = document.getElementById("status");
  status.innerText = "Sende...";

  const data = {
    customer:{
      vorname: vorname.value,
      nachname: nachname.value,
      email: email.value,
      adresse:{
        strasse:strasse.value,
        plz:plz.value,
        ort:ort.value,
        bundesland:bundesland.value
      }
    },

    service:{
      abbau: abbau.checked,
      transport: transport.checked,
      aufbau: aufbau.checked,
      transporter: document.querySelector('input[name="t"]:checked')?.value || ""
    },

    termin:{
      datum:datum.value,
      uhrzeit:uhrzeit.value
    },

    items:[
      Number(sesselAmount.value)>0 ? {name:"Sessel",amount:Number(sesselAmount.value)}:null,
      Number(stuhlAmount.value)>0 ? {name:"Stuhl",amount:Number(stuhlAmount.value)}:null,
      Number(hockerAmount.value)>0 ? {name:"Hocker",amount:Number(hockerAmount.value)}:null,
      Number(sofaAmount.value)>0 ? {name:"Sofa",amount:Number(sofaAmount.value)}:null,
      Number(couchAmount.value)>0 ? {name:"Couch",amount:Number(couchAmount.value)}:null,
      Number(tischAmount.value)>0 ? {name:"Tisch",amount:Number(tischAmount.value)}:null,
      Number(bettAmount.value)>0 ? {name:"Bett",amount:Number(bettAmount.value)}:null,
      Number(tvAmount.value)>0 ? {name:"TV",amount:Number(tvAmount.value)}:null
    ].filter(Boolean),

    note: note.value
  };

  try{

    const res = await fetch("DEINE_SCRIPT_URL",{
      method:"POST",
      body:JSON.stringify(data)
    });

    const text = await res.text();

    if(text.includes("OK")){
      localStorage.setItem("order", JSON.stringify(data));
      window.location.href="success.html";
    }else{
      status.innerText="Fehler: "+text;
    }

  }catch(e){
    status.innerText="Netzwerkfehler";
  }
}
</script>

</body>
</html>
