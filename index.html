<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bestellung</title>

<style>
body {
  font-family: Arial;
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 6px 0 12px 0;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: #1a73e8;
  color: white;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Kundendaten</h2>

<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">
<input id="telefon" placeholder="Telefon (optional)">

<h3>Adresse</h3>

<input id="strasse" placeholder="Straße + Hausnummer *">
<input id="plz" placeholder="PLZ *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<hr>

<h2>Bestellung</h2>

<label><input type="checkbox" id="sofa"> Sofa</label>
<input type="number" id="sofaAmount" placeholder="Stück">

<label><input type="checkbox" id="stuhl"> Stuhl</label>
<input type="number" id="stuhlAmount" placeholder="Stück">

<label><input type="checkbox" id="tisch"> Tisch</label>
<input type="number" id="tischAmount" placeholder="Stück">

<br><br>

<button onclick="sendData()">Absenden</button>

<p id="status"></p>

<script>
async function sendData() {

  const status = document.getElementById("status");

  // 🔴 Kundendaten
  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  const strasse = document.getElementById("strasse").value.trim();
  const plz = document.getElementById("plz").value.trim();
  const ort = document.getElementById("ort").value.trim();
  const bundesland = document.getElementById("bundesland").value.trim();

  // Pflichtfelder prüfen
  if (!vorname || !nachname || !email || !strasse || !plz || !ort || !bundesland) {
    status.innerText = "Bitte alle Pflichtfelder ausfüllen!";
    return;
  }

  // 🛒 Bestellung
  const items = [];

  if (document.getElementById("sofa").checked) {
    items.push({ name: "Sofa", amount: document.getElementById("sofaAmount").value || 1 });
  }

  if (document.getElementById("stuhl").checked) {
    items.push({ name: "Stuhl", amount: document.getElementById("stuhlAmount").value || 1 });
  }

  if (document.getElementById("tisch").checked) {
    items.push({ name: "Tisch", amount: document.getElementById("tischAmount").value || 1 });
  }

  if (items.length === 0) {
    status.innerText = "Bitte mindestens einen Artikel auswählen!";
    return;
  }

  status.innerText = "Sende...";

  try {

    const response = await fetch("https://script.google.com/macros/s/AKfycbzPqYMK7uWRVjEUF-S7BycNjGPzja3NGiWffM7bLlrrMxBuZmPZiO-WhOvk8-DoLbDXJw/execR", {
      method: "POST",
      body: JSON.stringify({
        customer: {
          vorname,
          nachname,
          email,
          telefon,
          adresse: {
            strasse,
            plz,
            ort,
            bundesland
          }
        },
        items
      })
    });

    const text = await response.text();

    status.innerText = text === "OK"
      ? "Bestellung erfolgreich!"
      : "Fehler beim Senden: " + text;

  } catch (error) {
    console.error(error);
    status.innerText = "Fehler beim Senden!";
  }
}
</script>

</body>
</html>
