<script>
async function send() {

  const status = document.getElementById("status");
  status.style.color = "black";
  status.innerText = "Sende...";

  if (!vorname.value || !nachname.value || !email.value) {
    status.style.color = "red";
    status.innerText = "Bitte Pflichtfelder ausfüllen!";
    return;
  }

  const data = {
    customer: {
      vorname: vorname.value,
      nachname: nachname.value,
      email: email.value,
      adresse: {
        strasse: strasse.value,
        plz: plz.value,
        ort: ort.value,
        bundesland: bundesland.value
      }
    },

    service: {
      abbau: abbau.checked,
      transport: transport.checked,
      aufbau: aufbau.checked,
      transporter: document.querySelector('input[name="t"]:checked')?.value || ""
    },

    termin: {
      datum: datum.value,
      uhrzeit: uhrzeit.value
    },

    items: [
      sessel.checked ? { name: "Sessel", amount: Number(sesselAmount.value || 1) } : null,
      stuhl.checked ? { name: "Stuhl", amount: Number(stuhlAmount.value || 1) } : null,
      hocker.checked ? { name: "Hocker", amount: Number(hockerAmount.value || 1) } : null,
      couch.checked ? { name: "Couch", amount: Number(couchAmount.value || 1) } : null,
      sofa.checked ? { name: "Sofa", amount: Number(sofaAmount.value || 1) } : null
    ].filter(Boolean),

    note: note.value || ""
  };

  try {

    const response = await fetch("https://script.google.com/macros/s/AKfycbzLqfZ9zMz4ccJZl5BN_R-abKrqrcLS1HrMpjZ3EU90bSMl7Z8jDWAOrXmU16LH002hgQ/exec", {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(data)
    });

    const text = await response.text();

    if (text.includes("OK")) {
      status.style.color = "green";
      status.innerText = "Erfolgreich gesendet!";

      setTimeout(() => {
        window.location.href = "success.html";
      }, 700);

    } else {
      status.style.color = "red";
      status.innerText = "Server Fehler: " + text;
    }

  } catch (error) {
    status.style.color = "red";
    status.innerText = "Netzwerkfehler!";
  }
}
</script>
