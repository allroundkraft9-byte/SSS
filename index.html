<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 20px;
}

.container{
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2{
  margin-top: 25px;
  margin-bottom: 12px;
}

input{
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  border-radius: 10px;
}

.item{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border: 1px solid #eee;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fafafa;
}

.item label{
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}

.item input[type="number"]{
  width: 90px;
  margin: 0;
}

button{
  width: 100%;
  padding: 14px;
  border: none;
  background: #1a73e8;
  color: white;
  font-size: 16px;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 15px;
}

#status{
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h2>🧾 Kundendaten</h2>

<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">
<input id="telefon" placeholder="Telefon (optional)">

<h2>📍 Adresse</h2>

<input id="strasse" placeholder="Straße + Hausnummer *">
<input id="plz" placeholder="Postleitzahl *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<h2>🛒 Produkte</h2>

<div id="products">

<div class="item"><label><input type="checkbox" id="sessel"> Sessel</label><input type="number" id="sesselAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="stuhl"> Stuhl</label><input type="number" id="stuhlAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="hocker"> Hocker</label><input type="number" id="hockerAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="regal"> Regal</label><input type="number" id="regalAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="kommode"> Kommode</label><input type="number" id="kommodeAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="koffer"> Koffer</label><input type="number" id="kofferAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="couch"> Couch</label><input type="number" id="couchAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="liege"> Liege</label><input type="number" id="liegeAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="sofa"> Sofa</label><input type="number" id="sofaAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="tisch"> Tisch</label><input type="number" id="tischAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="schreibtisch"> Schreibtisch</label><input type="number" id="schreibtischAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="bettgestell"> Bettgestell</label><input type="number" id="bettgestellAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="waschmaschine"> Waschmaschine</label><input type="number" id="waschmaschineAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="trockner"> Trockner</label><input type="number" id="trocknerAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="geschirrspueler"> Geschirrspüler</label><input type="number" id="geschirrspuelerAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="herd"> Herd</label><input type="number" id="herdAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="backofen"> Backofen</label><input type="number" id="backofenAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="fernseher"> Fernseher</label><input type="number" id="fernseherAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="teppich"> Teppich</label><input type="number" id="teppichAmount" placeholder="Stück"></div>
<div class="item"><label><input type="checkbox" id="matratzen"> Matratzen</label><input type="number" id="matratzenAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="fahrrad"> Fahrrad</label><input type="number" id="fahrradAmount" placeholder="Stück"></div>

<div class="item"><label><input type="checkbox" id="kuehlschrank"> Kühl-/Gefrierschrank</label><input type="number" id="kuehlschrankAmount" placeholder="Stück"></div>

</div>

<button onclick="sendData()">Bestellung absenden</button>

<p id="status"></p>

</div>

<script>
async function sendData() {

  const status = document.getElementById("status");

  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  const strasse = document.getElementById("strasse").value.trim();
  const plz = document.getElementById("plz").value.trim();
  const ort = document.getElementById("ort").value.trim();
  const bundesland = document.getElementById("bundesland").value.trim();

  if(!vorname || !nachname || !email || !strasse || !plz || !ort || !bundesland){
    status.innerText = "Bitte alle Pflichtfelder ausfüllen!";
    status.style.color = "red";
    return;
  }

  const items = [];

  const addItem = (id, name) => {
    if(document.getElementById(id).checked){
      items.push({
        name,
        amount: document.getElementById(id + "Amount").value || 1
      });
    }
  };

  addItem("sessel","Sessel");
  addItem("stuhl","Stuhl");
  addItem("hocker","Hocker");
  addItem("regal","Regal");
  addItem("kommode","Kommode");
  addItem("koffer","Koffer");
  addItem("couch","Couch");
  addItem("liege","Liege");
  addItem("sofa","Sofa");
  addItem("tisch","Tisch");
  addItem("schreibtisch","Schreibtisch");
  addItem("bettgestell","Bettgestell");
  addItem("waschmaschine","Waschmaschine");
  addItem("trockner","Trockner");
  addItem("geschirrspueler","Geschirrspüler");
  addItem("herd","Herd");
  addItem("backofen","Backofen");
  addItem("fernseher","Fernseher");
  addItem("teppich","Teppich");
  addItem("matratzen","Matratzen");
  addItem("fahrrad","Fahrrad");
  addItem("kuehlschrank","Kühl-/Gefrierschrank");

  if(items.length === 0){
    status.innerText = "Bitte mindestens ein Produkt auswählen!";
    status.style.color = "red";
    return;
  }

  status.innerText = "Sende...";
  status.style.color = "black";

  try {

    const response = await fetch("https://script.google.com/macros/s/AKfycbzjOy0c8YkcGfsF1C_RmR61EEKmDQaC5C75Y3SBivvLmjKqixbEwAFy0ztP0a_WA1wfAQ/exec", {
      method: "POST",
      body: JSON.stringify({
        customer:{
          vorname,
          nachname,
          email,
          telefon,
          adresse:{strasse,plz,ort,bundesland}
        },
        items
      })
    });

    const text = await response.text();

    if(text.includes("OK")){
      status.innerText = "Bestellung erfolgreich!";
      status.style.color = "green";
    } else {
      status.innerText = "Fehler: " + text;
      status.style.color = "red";
    }

  } catch(e){
    status.innerText = "Fehler beim Senden!";
    status.style.color = "red";
  }
}
</script>

</body>
</html>
