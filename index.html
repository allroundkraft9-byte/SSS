<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Möbel Anfrage</title>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  margin:0;
  padding:20px;
}

.container{
  max-width:950px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:12px;
}

h2{
  border-left:5px solid #1a73e8;
  padding-left:10px;
  margin-top:25px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:6px 0 12px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.card{
  flex:1;
  min-width:220px;
  background:#f7f9fc;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  width:100%;
  padding:14px;
  background:#1a73e8;
  color:white;
  border:none;
  font-size:16px;
  border-radius:8px;
  cursor:pointer;
}

#status{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Möbel Anfrage</h1>

<!-- KUNDE -->
<h2>Kundendaten</h2>
<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">

<!-- ADRESSE -->
<h2>Adresse</h2>
<input id="strasse" placeholder="Straße + Hausnummer *">
<input id="plz" placeholder="PLZ *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<!-- TRANSPORT -->
<h2>Transportziel</h2>
<input id="ziel" placeholder="Wohin sollen die Möbel geliefert werden? *">

<!-- TERMIN -->
<h2>Termin</h2>
<input id="datum" type="date">
<input id="uhrzeit" type="time">

<!-- SERVICE -->
<h2>Service</h2>
<label><input type="checkbox" id="abbau"> Abbau</label>
<label><input type="checkbox" id="transport"> Transport</label>
<label><input type="checkbox" id="aufbau"> Aufbau</label>

<br><br>

<label><input type="radio" name="t" value="vorhanden"> Transporter vorhanden</label>
<label><input type="radio" name="t" value="nicht vorhanden"> Kein Transporter</label>

<!-- MÖBEL (ALLE KATEGORIEN VOLLSTÄNDIG) -->
<h2>Möbel</h2>

<div class="row">
<div class="card">Sessel <input id="sessel" type="number" value="0"></div>
<div class="card">Stuhl <input id="stuhl" type="number" value="0"></div>
<div class="card">Hocker <input id="hocker" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Regal <input id="regal" type="number" value="0"></div>
<div class="card">Kommode <input id="kommode" type="number" value="0"></div>
<div class="card">Koffer <input id="koffer" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Couch <input id="couch" type="number" value="0"></div>
<div class="card">Liege <input id="liege" type="number" value="0"></div>
<div class="card">Sofa <input id="sofa" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Tisch <input id="tisch" type="number" value="0"></div>
<div class="card">Schreibtisch <input id="schreibtisch" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Bettgestell <input id="bett" type="number" value="0"></div>
<div class="card">Matratzen <input id="matratzen" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Waschmaschine <input id="waschmaschine" type="number" value="0"></div>
<div class="card">Trockner <input id="trockner" type="number" value="0"></div>
<div class="card">Geschirrspüler <input id="spueler" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Herd/Backofen <input id="herd" type="number" value="0"></div>
<div class="card">Fernseher <input id="tv" type="number" value="0"></div>
</div>

<div class="row">
<div class="card">Teppich <input id="teppich" type="number" value="0"></div>
<div class="card">Fahrrad <input id="fahrrad" type="number" value="0"></div>
<div class="card">Kühlschrank <input id="kuehlschrank" type="number" value="0"></div>
</div>

<!-- NOTIZ -->
<h2>Anmerkung</h2>
<textarea id="note"></textarea>

<button onclick="send()">ABSENDEN</button>

<div id="status"></div>

</div>

<script>
async function send(){

  const status = document.getElementById("status");
  status.innerText = "Sende...";

  const get = id => document.getElementById(id);

  const items = [
    ["Sessel",sessel.value],
    ["Stuhl",stuhl.value],
    ["Hocker",hocker.value],
    ["Regal",regal.value],
    ["Kommode",kommode.value],
    ["Koffer",koffer.value],
    ["Couch",couch.value],
    ["Liege",liege.value],
    ["Sofa",sofa.value],
    ["Tisch",tisch.value],
    ["Schreibtisch",schreibtisch.value],
    ["Bettgestell",bett.value],
    ["Matratzen",matratzen.value],
    ["Waschmaschine",waschmaschine.value],
    ["Trockner",trockner.value],
    ["Geschirrspüler",spueler.value],
    ["Herd/Backofen",herd.value],
    ["Fernseher",tv.value],
    ["Teppich",teppich.value],
    ["Fahrrad",fahrrad.value],
    ["Kühlschrank",kuehlschrank.value]
  ]
  .filter(i => Number(i[1]) > 0)
  .map(i => ({name:i[0],amount:Number(i[1])}));

  const data = {
    customer:{
      vorname:vorname.value,
      nachname:nachname.value,
      email:email.value,
      adresse:{
        strasse:strasse.value,
        plz:plz.value,
        ort:ort.value,
        bundesland:bundesland.value
      }
    },

    transportZiel: ziel.value,

    service:{
      abbau:abbau.checked,
      transport:transport.checked,
      aufbau:aufbau.checked,
      transporter:document.querySelector('input[name="t"]:checked')?.value || ""
    },

    termin:{
      datum:datum.value,
      uhrzeit:uhrzeit.value
    },

    items:items,
    note:note.value
  };

  try{

    const res = await fetch("https://script.google.com/macros/s/AKfycbzKxyQnd8w4gHiWR9pcB-atY6kt_SUS8ojHhcMfAJfzQlwYhVhRzA_AxQlm9l1WBWebNg/exec",{
      method:"POST",
      body:JSON.stringify(data)
    });

    const text = await res.text();

    if(text.includes("OK")){
      status.innerText = "✔ Anfrage erfolgreich gesendet!";
    }else{
      status.innerText = "Fehler: "+text;
    }

  }catch(e){
    status.innerText = "Netzwerkfehler";
  }
}
</script>

</body>
</html>
