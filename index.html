<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung</title>

<style>
body{
  font-family: Arial, sans-serif;
  background: #eef2f7;
  margin: 0;
  padding: 20px;
}

.container{
  max-width: 650px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2{
  margin-top: 25px;
  margin-bottom: 12px;
  font-size: 20px;
}

.section-title{
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 15px;
}

input{
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border: 1px solid #ddd;
  border-radius: 10px;
  outline: none;
  transition: 0.2s;
}

input:focus{
  border-color: #1a73e8;
  box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
}

.item{
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px;
  border: 1px solid #eee;
  border-radius: 12px;
  margin-bottom: 10px;
  background: #fafafa;
}

.item label{
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
}

.item input[type="number"]{
  width: 90px;
  margin: 0;
}

button{
  width: 100%;
  padding: 14px;
  border: none;
  background: linear-gradient(135deg, #1a73e8, #0b57d0);
  color: white;
  font-size: 16px;
  font-weight: bold;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 15px;
  transition: 0.2s;
}

button:hover{
  transform: translateY(-1px);
  opacity: 0.95;
}

#status{
  margin-top: 15px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<div class="section-title">🧾 Kundendaten</div>

<input type="text" id="vorname" placeholder="Vorname *">
<input type="text" id="nachname" placeholder="Nachname *">
<input type="email" id="email" placeholder="E-Mail *">
<input type="text" id="telefon" placeholder="Telefon (optional)">

<div class="section-title">📍 Adresse</div>

<input type="text" id="strasse" placeholder="Straße + Hausnummer *">
<input type="text" id="plz" placeholder="Postleitzahl *">
<input type="text" id="ort" placeholder="Ort *">
<input type="text" id="bundesland" placeholder="Bundesland *">

<div class="section-title">🛒 Bestellung</div>

<div class="item">
  <label>
    <input type="checkbox" id="sofa">
    Sofa
  </label>
  <input type="number" id="sofaAmount" placeholder="Stück" min="1">
</div>

<div class="item">
  <label>
    <input type="checkbox" id="stuhl">
    Stuhl
  </label>
  <input type="number" id="stuhlAmount" placeholder="Stück" min="1">
</div>

<div class="item">
  <label>
    <input type="checkbox" id="tisch">
    Tisch
  </label>
  <input type="number" id="tischAmount" placeholder="Stück" min="1">
</div>

<button onclick="sendData()">Bestellung absenden</button>

<p id="status"></p>

</div>

<script>
async function sendData() {

  const status = document.getElementById("status");
  status.style.color = "black";

  // Kundendaten
  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // Adresse
  const strasse = document.getElementById("strasse").value.trim();
  const plz = document.getElementById("plz").value.trim();
  const ort = document.getElementById("ort").value.trim();
  const bundesland = document.getElementById("bundesland").value.trim();

  // Pflichtprüfung
  if (!vorname || !nachname || !email || !strasse || !plz || !ort || !bundesland) {
    status.style.color = "red";
    status.innerText = "Bitte alle Pflichtfelder ausfüllen!";
    return;
  }

  // Artikel
  const items = [];

  const addItem = (id, name) => {
    const checkbox = document.getElementById(id);
    const amount = document.getElementById(id + "Amount");

    if (checkbox.checked) {
      items.push({
        name: name,
        amount: amount.value || 1
      });
    }
  };

  addItem("sofa", "Sofa");
  addItem("stuhl", "Stuhl");
  addItem("tisch", "Tisch");

  if (items.length === 0) {
    status.style.color = "red";
    status.innerText = "Bitte mindestens einen Artikel auswählen!";
    return;
  }

  status.innerText = "Sende...";

  try {

    const response = await fetch("https://script.google.com/macros/s/AKfycbx3SiNuCFaSqNdkdT9OA6hKktSAQh9kEqvNLoQ9-xL8U7a271kHTJPxNVJBtpkHGeRREA/exec", {
      method: "POST",
      body: JSON.stringify({
        customer: {
          vorname,
          nachname,
          email,
          telefon,
          adresse: {
            strasse,
            plz,
            ort,
            bundesland
          }
        },
        items
      })
    });

    const text = await response.text();

    if (text.includes("OK")) {
      status.style.color = "green";
      status.innerText = "Bestellung erfolgreich gesendet!";
    } else {
      status.style.color = "red";
      status.innerText = "Server Fehler: " + text;
    }

  } catch (error) {
    console.error(error);
    status.style.color = "red";
    status.innerText = "Fehler beim Senden!";
  }
}
</script>

</body>
</html>
