<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anfrage</title>

<style>
body{font-family:Arial;background:#eef2f7;padding:20px;}
.container{max-width:750px;margin:auto;background:white;padding:25px;border-radius:15px;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;}
.row{display:flex;gap:10px;flex-wrap:wrap;background:#f6f6f6;padding:10px;border-radius:10px;margin-bottom:10px;}
button{width:100%;padding:14px;background:#1a73e8;color:white;border:none;border-radius:10px;}
</style>
</head>

<body>

<div class="container">

<h2>Kundendaten</h2>

<input id="vorname" placeholder="Vorname *">
<input id="nachname" placeholder="Nachname *">
<input id="email" placeholder="E-Mail *">

<h2>Adresse</h2>

<input id="strasse" placeholder="Straße *">
<input id="plz" placeholder="PLZ *">
<input id="ort" placeholder="Ort *">
<input id="bundesland" placeholder="Bundesland *">

<h2>📅 Termin</h2>

<input type="date" id="datum">
<input type="time" id="uhrzeit">

<h2>🔧 Service</h2>

<div class="row">
<label><input type="checkbox" id="abbau"> Abbau</label>
<label><input type="checkbox" id="transport"> Transport</label>
<label><input type="checkbox" id="aufbau"> Aufbau</label>
</div>

<div class="row">
<label><input type="radio" name="t" value="vorhanden"> Transporter vorhanden</label>
<label><input type="radio" name="t" value="stellen"> Transporter stellen</label>
</div>

<h2>🛒 Produkte</h2>

<label><input type="checkbox" id="sofa"> Sofa</label>
<input type="number" id="sofaAmount">

<label><input type="checkbox" id="stuhl"> Stuhl</label>
<input type="number" id="stuhlAmount">

<label><input type="checkbox" id="tisch"> Tisch</label>
<input type="number" id="tischAmount">

<h2>✍️ Anmerkung</h2>

<textarea id="note"></textarea>

<button onclick="send()">Absenden</button>

</div>

<script>
async function send(){

  const data = {
    customer:{
      vorname: vorname.value,
      nachname: nachname.value,
      email: email.value,
      adresse:{
        strasse:strasse.value,
        plz:plz.value,
        ort:ort.value,
        bundesland:bundesland.value
      }
    },

    service:{
      abbau: abbau.checked,
      transport: transport.checked,
      aufbau: aufbau.checked,
      transporter: document.querySelector('input[name="t"]:checked')?.value
    },

    termin:{
      datum: datum.value,
      uhrzeit: uhrzeit.value
    },

    items:[
      sofa.checked ? {name:"Sofa",amount:sofaAmount.value||1}:null,
      stuhl.checked ? {name:"Stuhl",amount:stuhlAmount.value||1}:null,
      tisch.checked ? {name:"Tisch",amount:tischAmount.value||1}:null
    ].filter(Boolean),

    note: note.value
  };

  localStorage.setItem("order", JSON.stringify(data));

  await fetch("https://script.google.com/macros/s/AKfycbzLqfZ9zMz4ccJZl5BN_R-abKrqrcLS1HrMpjZ3EU90bSMl7Z8jDWAOrXmU16LH002hgQ/exec",{
    method:"POST",
    body:JSON.stringify(data)
  });

  window.location.href="success.html";
}
</script>

</body>
</html>
