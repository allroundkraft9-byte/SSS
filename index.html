<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung</title>

<style>
body{
  font-family: Arial, sans-serif;
  max-width: 600px;
  margin: auto;
  padding: 20px;
  background: #f5f5f5;
}

.container{
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2{
  margin-top: 0;
}

input{
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  box-sizing: border-box;
}

.item{
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.item input[type="number"]{
  width: 100px;
}

button{
  width: 100%;
  padding: 14px;
  border: none;
  background: #1a73e8;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover{
  opacity: 0.9;
}

#status{
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Kundendaten</h2>

<input type="text" id="vorname" placeholder="Vorname *">
<input type="text" id="nachname" placeholder="Nachname *">
<input type="email" id="email" placeholder="E-Mail *">
<input type="text" id="telefon" placeholder="Telefon (optional)">

<h2>Adresse</h2>

<input type="text" id="strasse" placeholder="Straße + Hausnummer *">
<input type="text" id="plz" placeholder="Postleitzahl *">
<input type="text" id="ort" placeholder="Ort *">
<input type="text" id="bundesland" placeholder="Bundesland *">

<h2>Bestellung</h2>

<div class="item">
  <label>
    <input type="checkbox" id="sofa">
    Sofa
  </label>
  <input type="number" id="sofaAmount" placeholder="Stück" min="1">
</div>

<div class="item">
  <label>
    <input type="checkbox" id="stuhl">
    Stuhl
  </label>
  <input type="number" id="stuhlAmount" placeholder="Stück" min="1">
</div>

<div class="item">
  <label>
    <input type="checkbox" id="tisch">
    Tisch
  </label>
  <input type="number" id="tischAmount" placeholder="Stück" min="1">
</div>

<button onclick="sendData()">Absenden</button>

<p id="status"></p>

</div>

<script>
async function sendData() {

  const status = document.getElementById("status");
  status.style.color = "red";

  // Kundendaten
  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  const email = document.getElementById("email").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // Adresse
  const strasse = document.getElementById("strasse").value.trim();
  const plz = document.getElementById("plz").value.trim();
  const ort = document.getElementById("ort").value.trim();
  const bundesland = document.getElementById("bundesland").value.trim();

  // Pflichtfelder prüfen
  if (
    !vorname ||
    !nachname ||
    !email ||
    !strasse ||
    !plz ||
    !ort ||
    !bundesland
  ) {
    status.innerText =
      "Bitte alle Pflichtfelder ausfüllen!";
    return;
  }

  // Artikel sammeln
  const items = [];

  if (document.getElementById("sofa").checked) {
    items.push({
      name: "Sofa",
      amount:
        document.getElementById("sofaAmount").value || 1
    });
  }

  if (document.getElementById("stuhl").checked) {
    items.push({
      name: "Stuhl",
      amount:
        document.getElementById("stuhlAmount").value || 1
    });
  }

  if (document.getElementById("tisch").checked) {
    items.push({
      name: "Tisch",
      amount:
        document.getElementById("tischAmount").value || 1
    });
  }

  if (items.length === 0) {
    status.innerText =
      "Bitte mindestens einen Artikel auswählen!";
    return;
  }

  status.style.color = "black";
  status.innerText = "Sende...";

  const payload = {
    customer: {
      vorname: vorname,
      nachname: nachname,
      email: email,
      telefon: telefon,
      adresse: {
        strasse: strasse,
        plz: plz,
        ort: ort,
        bundesland: bundesland
      }
    },
    items: items
  };

  try {

    
}
</script>

</body>
</html>
